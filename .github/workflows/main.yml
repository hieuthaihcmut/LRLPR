name: Build, Train, and Version Model

on:
  push:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          # persist-credentials: false # uncomment this if you use a PAT to push
          # fetch-depth: 0 # uncomment this if you need to fetch all history for all branches

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[all] # Or install your specific DVC backend: [s3], [gdrive], etc.

      # IMPORTANT: Configure DVC remote credentials.
      # You must store your credentials as secrets in your GitHub repository settings.
      # Go to Settings > Secrets and variables > Actions > New repository secret
      # Example for Google Drive:
      # - name: Authenticate DVC (Google Drive)
      #   uses: iterative/setup-dvc@v1
      #   env:
      #     GDRIVE_CREDENTIALS_DATA: ${% raw %}${{ secrets.GDRIVE_CREDENTIALS_DATA }}{% endraw %}
      #
      # Example for AWS S3:
      # - name: Configure AWS Credentials
      #   uses: aws-actions/configure-aws-credentials@v2
      #   with:
      #     aws-access-key-id: ${% raw %}${{ secrets.AWS_ACCESS_KEY_ID }}{% endraw %}
      #     aws-secret-access-key: ${% raw %}${{ secrets.AWS_SECRET_ACCESS_KEY }}{% endraw %}
      #     aws-region: your-region

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model
        # This step might require environment variables for secrets like WANDB_API_KEY
        # You should add them to your repository secrets
        env:
          WANDB_API_KEY: ${% raw %}${{ secrets.WANDB_API_KEY }}{% endraw %}
        run: python train.py

      - name: Push results to DVC
        run: dvc push

      - name: Commit DVC changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "CI: Train model and update DVC artifacts" || echo "No changes to commit"
          git push
